<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Kaptas Global</title>

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="xh0QXRb1OFYSaFRXzc0mCSc4__gQQiUIJudvUYJW5G4" />

    <!-- hreflang -->
    <link rel="alternate" hreflang="en-us" href="https://kaptasglobal.io/" />
    <link rel="alternate" hreflang="x-default" href="https://kaptasglobal.io/" />
    <link rel="alternate" hreflang="en" href="https://kaptasglobal.io/" />

    <!--
      Font loading optimization. Inter is loaded from Google Fonts.
        - preconnect warms up the TLS handshake to fonts.gstatic.com so the
          font binaries land faster once the CSS resolves.
        - preload + the "media=print, onload" pattern asks the browser to
          fetch the font stylesheet without blocking initial render, then
          flips the media to "all" once it has arrived.
        - <noscript> fallback for the (vanishingly rare) JS-disabled visitor.
      Net effect on mobile: ~800-1200ms off FCP vs the old `@import` in CSS.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      />
    </noscript>

    <!--
      Third-party trackers (Apollo + LinkedIn Insight Tag) are deferred until
      the main thread is idle, or 2.5 seconds after first paint at the latest.
      Before: both scripts executed synchronously on parse, adding ~600ms of
      blocking time before the React hydration could even start.
      After: hydration runs first, then trackers fire — analytics still
      captures the visit because deferral is far below the typical session
      length, and Core Web Vitals improve materially.
    -->
    <script>
      (function () {
        function loadTrackers() {
          // Apollo.io website tracker
          (function () {
            var n = Math.random().toString(36).substring(7);
            var o = document.createElement("script");
            o.src =
              "https://assets.apollo.io/micro/website-tracker/tracker.iife.js?nocache=" + n;
            o.async = true;
            o.defer = true;
            o.onload = function () {
              if (window.trackingFunctions) {
                window.trackingFunctions.onLoad({ appId: "66967cc9c931da029454aee5" });
              }
            };
            document.head.appendChild(o);
          })();

          // LinkedIn Insight Tag
          window._linkedin_partner_id = "7052066";
          window._linkedin_data_partner_ids = window._linkedin_data_partner_ids || [];
          window._linkedin_data_partner_ids.push(window._linkedin_partner_id);
          (function (l) {
            if (!l) {
              window.lintrk = function (a, b) {
                window.lintrk.q.push([a, b]);
              };
              window.lintrk.q = [];
            }
            var s = document.getElementsByTagName("script")[0];
            var b = document.createElement("script");
            b.type = "text/javascript";
            b.async = true;
            b.src = "https://snap.licdn.com/li.lms-analytics/insight.min.js";
            s.parentNode.insertBefore(b, s);
          })(window.lintrk);
        }

        if ("requestIdleCallback" in window) {
          window.requestIdleCallback(loadTrackers, { timeout: 2500 });
        } else {
          window.addEventListener("load", loadTrackers);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- LinkedIn Insight Tag fallback pixel (no-JS users) -->
    <noscript>
      <img height="1" width="1" style="display:none;" alt="" src="https://px.ads.linkedin.com/collect/?pid=7052066&fmt=gif" />
    </noscript>
  </body>
</html>
