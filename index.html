    <!-- Google Tag Manager (production hostname only — keeps localhost dev,
         Vercel preview deployments, and any other host from polluting GA4) -->

      if (/(^|\.)kaptasglobal\.io$/.test(location.hostname)) {
        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':

    <!-- hreflang tags are emitted per-page in src/components/SEO.tsx
         (pointing to each page's canonical URL, not the root). Do NOT
         re-add static hreflang here — it would override Helmet's per-page
         values and ship every page with hreflang="..." href=root, which
         tells Google the "US version of this page" is the homepage. -->

    <!-- LinkedIn Insight Tag (script in head; <noscript> img is in body to satisfy HTML5: <img> is not allowed inside a <noscript> in <head>) -->
    <script type="text/javascript">
      _linkedin_partner_id = "7052066";
      window._linkedin_data_partner_ids = window._linkedin_data_partner_ids || [];
      window._linkedin_data_partner_ids.push(_linkedin_partner_id);
    </script>
    <script type="text/javascript">
      (function(l) {
        if (!l){window.lintrk = function(a,b){window.lintrk.q.push([a,b])};
        window.lintrk.q=[]}
        var s = document.getElementsByTagName("script")[0];
        var b = document.createElement("script");
        b.type = "text/javascript"; b.async = true;
        b.src = "https://snap.licdn.com/li.lms-analytics/insight.min.js";
        s.parentNode.insertBefore(b, s);

    </script>
